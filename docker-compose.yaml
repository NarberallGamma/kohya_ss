# Kohya_ss в Docker — окружение под ai_forks (рядом с stable-diffusion-webui-docker).
# Модели: общая папка WebUI (чекпоинты + LoRA). Датасеты: ./dataset (например dataset/10_texas).
#
# Запуск: ./run.sh help

name: kohya-docker

services:
  kohya-ss-gui:
    container_name: kohya-ss-gui
    image: kohya-ss-gui:local
    user: "1000:0"
    build:
      context: .
      args:
        - UID=1000
    ports:
      - "${KOHYA_PORT:-7861}:7860"
    environment:
      SAFETENSORS_FAST_GPU: "1"
      TENSORBOARD_PORT: ${TENSORBOARD_PORT:-6006}
    tmpfs:
      - /tmp
    volumes:
      # Чекпоинты и LoRA — та же директория, что у AUTOMATIC1111 (путь из .env)
      - ${MODELS_HOST_PATH:-../stable-diffusion-webui-docker/data/models}:/app/models:rw
      # Датасеты обучения (подпапки 10_name и т.д.)
      - ./dataset:/dataset:rw
      - ./dataset:/app/data:rw
      - ./dataset/logs:/app/logs:rw
      - ./dataset/outputs:/app/outputs:rw
      - ./dataset/regularization:/app/regularization:rw
      - ./.cache/config:/app/config:rw
      - ./.cache/user:/home/1000/.cache:rw
      - ./.cache/triton:/home/1000/.triton:rw
      - ./.cache/nv:/home/1000/.nv:rw
      - ./.cache/keras:/home/1000/.keras:rw
      - ./.cache/config:/home/1000/.config:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["all"]

  tensorboard:
    container_name: kohya-tensorboard
    image: tensorflow/tensorflow:latest-gpu
    profiles: ["tensorboard"]
    ports:
      - "${TENSORBOARD_PORT:-6006}:6006"
    volumes:
      - ./dataset/logs:/app/logs:rw
    command: tensorboard --logdir=/app/logs --bind_all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["all"]
